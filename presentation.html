<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>데이터 사이언스 포트폴리오</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet" crossorigin/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #0B1120;
    overflow: hidden;
    font-family: 'Noto Sans KR', sans-serif;
  }

  /* ── Outer shell ─────────────────────────── */
  .outer {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    gap: 0;
  }

  /* ── Middle row: prev | viewport | next ─── */
  .slide-row {
    display: flex;
    align-items: center;
    gap: 18px;
    flex-shrink: 0;
  }

  /* Clips the scaled canvas to its visual size */
  .slide-viewport {
    overflow: hidden;
    flex-shrink: 0;
    border-radius: 8px;
    box-shadow:
      0 30px 80px rgba(0, 0, 0, 0.6),
      0 0 0 1px rgba(255, 255, 255, 0.06);
    position: relative;
  }

  /* Fixed 1280×720, scaled via JS */
  .slide-canvas {
    width: 1280px;
    height: 720px;
    position: relative;
    transform-origin: top left;
    flex-shrink: 0;
  }

  /* Each slide sits absolutely inside the canvas */
  .slide {
    position: absolute;
    top: 0; left: 0;
    width: 1280px;
    height: 720px;
    will-change: transform, opacity;
  }
  .slide iframe {
    width: 1280px;
    height: 720px;
    border: none;
    display: block;
  }

  /* ── Nav Buttons ────────────────────────── */
  .nav-btn {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.07);
    border: 1px solid rgba(255, 255, 255, 0.13);
    color: rgba(255, 255, 255, 0.75);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    outline: none;
    transition: background 0.2s, border-color 0.2s, transform 0.15s, opacity 0.25s;
    user-select: none;
  }
  .nav-btn:hover:not(:disabled) {
    background: rgba(255, 255, 255, 0.16);
    border-color: rgba(255, 255, 255, 0.3);
    transform: scale(1.08);
  }
  .nav-btn:active:not(:disabled) { transform: scale(0.93); }
  .nav-btn:disabled { opacity: 0.18; cursor: not-allowed; }

  /* ── Bottom row: counter + dots ─────────── */
  .bottom-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 13px;
    flex-shrink: 0;
  }

  .slide-counter {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.3);
    font-weight: 600;
    letter-spacing: 0.08em;
    min-width: 46px;
    text-align: right;
  }

  .dots-nav {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 4px;
    background: rgba(255, 255, 255, 0.22);
    cursor: pointer;
    border: none;
    padding: 0;
    outline: none;
    transition: width 0.32s cubic-bezier(0.4, 0, 0.2, 1),
                background 0.28s ease;
  }
  .dot.active {
    width: 26px;
    background: #3B82F6;
  }
  .dot:hover:not(.active) { background: rgba(255, 255, 255, 0.5); }

  /* ── Loading overlay ─────────────────────── */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: #F8FAFC;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99;
    border-radius: 8px;
    transition: opacity 0.4s ease;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(37,99,235,0.2);
    border-top-color: #2563EB;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="outer">
  <div class="slide-row">

    <button class="nav-btn" id="prevBtn" aria-label="이전 슬라이드">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>

    <div class="slide-viewport" id="slideViewport">
      <div class="slide-canvas" id="slideCanvas"></div>
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
      </div>
    </div>

    <button class="nav-btn" id="nextBtn" aria-label="다음 슬라이드">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </button>

  </div>

  <div class="bottom-row">
    <div class="slide-counter" id="counter">1 / 12</div>
    <div class="dots-nav" id="dotsNav"></div>
  </div>
</div>

<script>
(function () {
  /* ── Config ────────────────────────────── */
  const SLIDES = [
    'index.html',
    'p2.html', 'p3.html', 'p4.html', 'p5.html',  'p6.html',
    'p7.html', 'p8.html', 'p9.html', 'p10.html', 'p11.html', 'p12.html'
  ];
  const N = SLIDES.length;
  const ANIM_MS = 560;

  /* ── State ─────────────────────────────── */
  let current   = 0;
  let animating = false;

  /* ── DOM refs ──────────────────────────── */
  const canvas    = document.getElementById('slideCanvas');
  const viewport  = document.getElementById('slideViewport');
  const prevBtn   = document.getElementById('prevBtn');
  const nextBtn   = document.getElementById('nextBtn');
  const dotsNav   = document.getElementById('dotsNav');
  const counter   = document.getElementById('counter');
  const loadingEl = document.getElementById('loadingOverlay');

  /* ── Build slide elements ──────────────── */
  const slides = SLIDES.map((src, i) => {
    const div = document.createElement('div');
    div.className = 'slide';
    // Active slide: visible & centered; others: hidden off-screen
    if (i === 0) {
      div.style.cssText = 'transform:translateX(0);opacity:1;z-index:2;';
    } else {
      div.style.cssText = 'transform:translateX(100%);opacity:0;z-index:1;display:none;';
    }

    const iframe = document.createElement('iframe');
    iframe.setAttribute('scrolling', 'no');
    iframe.setAttribute('frameborder', '0');
    // Lazy-load: set src for adjacent slides only
    if (i === 0 || i === 1) iframe.src = src;

    iframe.addEventListener('load', () => {
      entry.loaded = true;
      if (i === 0) {
        // Hide loading overlay once first slide is ready
        setTimeout(() => loadingEl.classList.add('hidden'), 200);
      }
      if (i === current) triggerAnimations(i);
    });

    div.appendChild(iframe);
    canvas.appendChild(div);

    const entry = { div, iframe, src, loaded: false, animated: false };
    return entry;
  });

  /* ── Build dot buttons ─────────────────── */
  const dots = SLIDES.map((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'dot' + (i === 0 ? ' active' : '');
    btn.title = `슬라이드 ${i + 1}`;
    btn.addEventListener('click', () => { if (!animating) goTo(i); });
    dotsNav.appendChild(btn);
    return btn;
  });

  /* ── Responsive scale ──────────────────── */
  function applyScale() {
    const BTN_W  = (46 + 18) * 2;   // 2 × (button + gap)
    const BOT_H  = 13 + 28;         // margin-top + bottom row height
    const availW = Math.max(window.innerWidth  - BTN_W  - 20, 320);
    const availH = Math.max(window.innerHeight - BOT_H  - 20, 240);

    const scale = Math.min(availW / 1280, availH / 720);

    canvas.style.transform  = `scale(${scale})`;
    viewport.style.width    = Math.round(1280 * scale) + 'px';
    viewport.style.height   = Math.round(720  * scale) + 'px';
  }
  window.addEventListener('resize', applyScale);
  applyScale();

  /* ── Navigation core ───────────────────── */
  function goTo(target, explicitDir) {
    if (animating || target === current) return;
    if (target < 0 || target >= N) return;

    animating = true;
    const dir  = explicitDir !== undefined ? explicitDir : (target > current ? 1 : -1);
    const from = current;
    current    = target;

    const fromEl = slides[from];
    const toEl   = slides[target];

    // Ensure target iframe has src loaded
    if (!toEl.iframe.src || toEl.iframe.src === 'about:blank') {
      toEl.iframe.src = toEl.src;
    }
    // Preload next neighbor
    const neighbor = target + dir;
    if (neighbor >= 0 && neighbor < N && !slides[neighbor].iframe.src) {
      slides[neighbor].iframe.src = slides[neighbor].src;
    }

    // Show target slide off-screen
    toEl.div.style.display    = '';
    toEl.div.style.transition = 'none';
    toEl.div.style.transform  = `translateX(${dir * 100}%)`;
    toEl.div.style.opacity    = '1';
    toEl.div.style.zIndex     = '3';
    fromEl.div.style.zIndex   = '2';

    // Force reflow so transition kicks in
    void toEl.div.offsetWidth;

    const ease = `${ANIM_MS}ms cubic-bezier(0.4,0,0.2,1)`;
    toEl.div.style.transition   = `transform ${ease}, opacity ${ease}`;
    fromEl.div.style.transition = `transform ${ease}, opacity ${ease}`;

    toEl.div.style.transform    = 'translateX(0)';
    toEl.div.style.opacity      = '1';
    fromEl.div.style.transform  = `translateX(${-dir * 100}%)`;
    fromEl.div.style.opacity    = '0';

    updateUI(target);

    setTimeout(() => {
      // Clean up outgoing slide
      fromEl.div.style.transition = 'none';
      fromEl.div.style.transform  = 'translateX(0)';
      fromEl.div.style.opacity    = '0';
      fromEl.div.style.zIndex     = '1';
      fromEl.div.style.display    = 'none';

      // Settle incoming slide
      toEl.div.style.transition = 'none';
      toEl.div.style.zIndex     = '2';

      animating = false;

      if (toEl.loaded && !toEl.animated) triggerAnimations(target);
    }, ANIM_MS + 30);
  }

  function navigate(dir) { goTo(current + dir, dir); }

  /* ── UI sync ───────────────────────────── */
  function updateUI(idx) {
    dots.forEach((d, i) => d.classList.toggle('active', i === idx));
    counter.textContent   = `${idx + 1} / ${N}`;
    prevBtn.disabled      = idx === 0;
    nextBtn.disabled      = idx === N - 1;
  }
  updateUI(0);

  /* ── Button & keyboard events ──────────── */
  prevBtn.addEventListener('click', () => navigate(-1));
  nextBtn.addEventListener('click', () => navigate(1));

  document.addEventListener('keydown', e => {
    if (animating) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  navigate(1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')    navigate(-1);
  });

  /* ── Per-slide animations ──────────────── */
  function triggerAnimations(idx) {
    if (slides[idx].animated) return;
    slides[idx].animated = true;

    const iframe = slides[idx].iframe;
    let doc;
    try {
      doc = iframe.contentDocument || iframe.contentWindow.document;
      if (!doc || !doc.body) return;
    } catch (e) { return; }

    // Inject animation stylesheet (once per document)
    if (!doc.querySelector('[data-pf-anim]')) {
      const s = doc.createElement('style');
      s.setAttribute('data-pf-anim', '1');
      s.textContent = `
        @keyframes _pfUp {
          from { opacity:0; transform:translateY(16px); }
          to   { opacity:1; transform:translateY(0); }
        }
        @keyframes _pfLeft {
          from { opacity:0; transform:translateX(-16px); }
          to   { opacity:1; transform:translateX(0); }
        }
        @keyframes _pfScale {
          from { opacity:0; transform:scale(0.92); }
          to   { opacity:1; transform:scale(1); }
        }
        ._pf-up   { animation: _pfUp   0.55s cubic-bezier(0.4,0,0.2,1) both; }
        ._pf-left { animation: _pfLeft 0.5s  cubic-bezier(0.4,0,0.2,1) both; }
        ._pf-scale{ animation: _pfScale 0.5s cubic-bezier(0.4,0,0.2,1) both; }
      `;
      doc.head.appendChild(s);
    }

    // ① Number countUp
    const NUM_SEL = ['.stat-value', '.metric-value', '.number-value'];
    NUM_SEL.forEach(sel => {
      try {
        doc.querySelectorAll(sel).forEach(el => {
          if (el.dataset.pfCounted) return;
          const text  = el.textContent.trim();
          const match = text.match(/^([\d,]+(?:\.\d+)?)/);
          if (!match) return;
          const raw    = parseFloat(match[1].replace(/,/g, ''));
          if (isNaN(raw) || raw <= 0) return;
          el.dataset.pfCounted = '1';
          const suffix = text.slice(match[0].length);
          countUp(el, raw, suffix, 1100);
        });
      } catch (_) {}
    });

    // ② Card / section fade-in-up
    const CARD_SEL = [
      '.project-card', '.timeline-item', '.skill-bar-wrapper',
      '.metric-card', '.stat-card', '.glass-panel',
      '.tag-badge', '.tech-tag-item'
    ];
    let delay = 60;
    CARD_SEL.forEach(sel => {
      try {
        doc.querySelectorAll(sel).forEach(el => {
          if (el.dataset.pfFaded) return;
          el.dataset.pfFaded = '1';
          el.style.opacity   = '0';
          const d = delay;
          setTimeout(() => {
            el.style.opacity          = '';
            el.style.animationDelay   = `${d}ms`;
            el.classList.add('_pf-up');
          }, 80);
          delay += 55;
        });
      } catch (_) {}
    });

    // ③ Skill / progress bars fill animation
    try {
      doc.querySelectorAll('[style*="width:"][class*="progress"], [style*="width:"][class*="bar-fill"]').forEach(el => {
        if (el.dataset.pfBar) return;
        el.dataset.pfBar = '1';
        const targetW = el.style.width;
        el.style.width      = '0%';
        el.style.transition = 'width 1s cubic-bezier(0.4,0,0.2,1)';
        setTimeout(() => { el.style.width = targetW; }, 150);
      });
    } catch (_) {}
  }

  /* ── CountUp helper ────────────────────── */
  function countUp(el, target, suffix, duration) {
    const isInt = Number.isInteger(target);
    const t0    = performance.now();
    function tick(now) {
      const p    = Math.min((now - t0) / duration, 1);
      const ease = 1 - Math.pow(1 - p, 3);
      const val  = target * ease;
      el.textContent = (isInt ? Math.round(val).toLocaleString() : val.toFixed(1)) + suffix;
      if (p < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  /* ── Bootstrap: trigger anim for first slide once loaded ── */
  const pollFirst = setInterval(() => {
    try {
      const doc = slides[0].iframe.contentDocument;
      if (doc && doc.readyState === 'complete') {
        clearInterval(pollFirst);
        slides[0].loaded = true;
        triggerAnimations(0);
        loadingEl.classList.add('hidden');
      }
    } catch (_) { clearInterval(pollFirst); }
  }, 100);

})();
</script>
</body>
</html>
